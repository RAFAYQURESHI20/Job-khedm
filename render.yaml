services:
  - type: web
    name: jobpulse-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobpulse-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
      - key: DEBUG
        value: false

  - type: cron
    name: jobpulse-daily-scraper
    runtime: python
    buildCommand: pip install -r requirements.txt
    schedule: "0 2 * * *"
    command: python run_daily_pipeline.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobpulse-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: jobpulse-db
    databaseName: jobpulse
    user: jobpulse_user
    plan: starter
